name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # NOTE: macos-15 runners ship with Xcode 16.x.
      # If the project requires a newer Xcode (e.g. for iOS 26 APIs),
      # update the path below to match the installed version.
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Generate Secrets.xcconfig
        run: |
          cat > Secrets.xcconfig <<EOF
          // Auto-generated for CI
          RAWG_API_KEY = ${{ secrets.RAWG_API_KEY || 'CI_PLACEHOLDER_KEY' }}
          EOF

      - name: List available simulators
        run: |
          xcrun simctl list devices available | grep -i iphone | head -10

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project Gameboxd.xcodeproj \
            -scheme Gameboxd \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=26.0 \
            | xcpretty
          exit ${PIPESTATUS[0]}

      - name: Test
        run: |
          set -o pipefail
          DEST=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          print(f\"platform=iOS Simulator,id={d['udid']}\")
                          sys.exit(0)
          sys.exit(1)
          ")
          xcodebuild test-without-building \
            -project Gameboxd.xcodeproj \
            -scheme Gameboxd \
            -configuration Debug \
            -destination "$DEST" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=26.0 \
            | xcpretty
          exit ${PIPESTATUS[0]}

      - name: Upload Test Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 7

  swiftlint:
    name: SwiftLint
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint lint --reporter github-actions-logging

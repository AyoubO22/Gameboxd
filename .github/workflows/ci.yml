name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # NOTE: macos-15 runners ship with Xcode 16.x.
      # If the project requires a newer Xcode (e.g. for iOS 26 APIs),
      # update the path below to match the installed version.
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Generate Secrets.xcconfig
        run: |
          cat > Secrets.xcconfig <<EOF
          // Auto-generated for CI
          RAWG_API_KEY = ${{ secrets.RAWG_API_KEY || 'CI_PLACEHOLDER_KEY' }}
          EOF

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project Gameboxd.xcodeproj \
            -scheme Gameboxd \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=26.0 \
            SWIFT_COMPILATION_MODE=singlefile \
            | xcpretty
          exit ${PIPESTATUS[0]}

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project Gameboxd.xcodeproj \
            -scheme Gameboxd \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=26.0 \
            SWIFT_COMPILATION_MODE=singlefile \
            | xcpretty
          exit ${PIPESTATUS[0]}

      - name: Upload Test Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 7

  swiftlint:
    name: SwiftLint
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint lint --reporter github-actions-logging

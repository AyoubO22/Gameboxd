included:
  - Gameboxd
  - GameboxdTests
  - GameboxdWidget

excluded:
  - Gameboxd.xcodeproj
  - Docker
  - DerivedData

disabled_rules:
  - trailing_whitespace
  - line_length
  - identifier_name
  - type_name
